    <title>Hotel Booking - Zoltan</title>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      #root {
        background: #ffffff;
        min-height: 100vh;
      }
      .dark #root {
        background: #0f172a;
      }
      #loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #loader-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-container {
        position: relative;
        width: 140px;
        height: 140px;
      }
      /* Hotel Building */
      .loader-hotel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 60px;
        animation: hotelPulse 1.5s ease-in-out infinite;
      }
      .loader-hotel svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.2));
      }
      /* Location Pins Orbiting */
      .loader-pin {
        position: absolute;
        width: 24px;
        height: 24px;
        animation: pinOrbit 2.5s ease-in-out infinite;
      }
      .loader-pin svg {
        width: 100%;
        height: 100%;
        fill: #fbbf24;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      }
      .loader-pin-1 {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        animation-delay: 0s;
      }
      .loader-pin-2 {
        bottom: 15px;
        right: 0;
        animation-delay: -0.8s;
      }
      .loader-pin-3 {
        bottom: 15px;
        left: 0;
        animation-delay: -1.6s;
      }
      /* Star Ratings */
      .loader-stars {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 4px;
        margin-top: -45px;
      }
      .loader-star {
        width: 10px;
        height: 10px;
        animation: starTwinkle 1s ease-in-out infinite;
      }
      .loader-star svg {
        width: 100%;
        height: 100%;
        fill: #fbbf24;
      }
      .loader-star:nth-child(2) { animation-delay: 0.1s; }
      .loader-star:nth-child(3) { animation-delay: 0.2s; }
      .loader-star:nth-child(4) { animation-delay: 0.3s; }
      .loader-star:nth-child(5) { animation-delay: 0.4s; }
      /* Key Animation */
      .loader-key {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 30px;
        height: 30px;
        animation: keyRotate 2s ease-in-out infinite;
      }
      .loader-key svg {
        width: 100%;
        height: 100%;
        fill: #ffffff;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      }
      /* Loading Text */
      .loader-text {
        margin-top: 25px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 2px;
        animation: textPulse 1.5s ease-in-out infinite;
      }
      .loader-dots {
        display: inline-flex;
        gap: 4px;
        margin-left: 4px;
      }
      .loader-dot {
        width: 4px;
        height: 4px;
        background: #ffffff;
        border-radius: 50%;
        animation: dotBounce 0.6s ease-in-out infinite;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.1s; }
      .loader-dot:nth-child(3) { animation-delay: 0.2s; }
      /* Animations */
      @keyframes hotelPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -50%) scale(1.05); }
      }
      @keyframes pinOrbit {
        0%, 100% { transform: scale(1) translateY(0); opacity: 0.8; }
        50% { transform: scale(1.2) translateY(-8px); opacity: 1; }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.5; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes keyRotate {
        0%, 100% { transform: translateX(-50%) rotate(0deg); }
        25% { transform: translateX(-50%) rotate(-15deg); }
        75% { transform: translateX(-50%) rotate(15deg); }
      }
      @keyframes textPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      @keyframes dotBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
    </style>
  </head>

    <div id="root"></div>
    <script>
      (function() {
        var minLoadTime = 1500;
        var startTime = Date.now();
        window.hideLoader = function() {
          var elapsed = Date.now() - startTime;
          var remaining = Math.max(0, minLoadTime - elapsed);
          setTimeout(function() {
            var loader = document.getElementById('loader-overlay');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(function() {
                loader.style.display = 'none';
              }, 500);
            }
          }, remaining);
        };
      })();
    </script>
